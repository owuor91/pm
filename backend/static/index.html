<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Management MVP</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f7fafc; color: #0f172a; }
      .card { max-width: 520px; width: 100%; padding: 2rem; border-radius: 24px; background: white; box-shadow: 0 24px 64px rgba(15, 23, 42, 0.12); }
      h1 { margin: 0 0 0.75rem; font-size: clamp(2rem, 2.75vw, 2.5rem); }
      p { margin: 0; line-height: 1.6; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Project Management MVP</h1>
      <p>The backend is running. Visit <code>/api/hello</code> for the test API route.</p>
    </main>
  </body>
</html>
